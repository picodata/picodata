default:
  tags:
    - docker-picodata
  image:
    name: ${BASE_IMAGE}:${BASE_IMAGE_TAG}
    pull_policy: always
  interruptible: true
  retry:
    max: 1
    when:
      - scheduler_failure
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure

stages:
  - build-base-image
  - clone
  - test
  - pack
  - docker
  - postpack-test
  - deploy

workflow:
  # See https://docs.gitlab.com/ee/ci/jobs/job_control.html#avoid-duplicate-pipelines
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

variables:
  REGISTRY: docker-public.binary.picodata.io
  BASE_IMAGE: ${CI_REGISTRY_IMAGE}/picodata-build-base
  BASE_IMAGE_LATEST: latest
  BASE_IMAGE_TAG: ${BASE_IMAGE_LATEST}

  MAIN_BRANCH: &main-branch master
  # to use in cache:key, do not forget to update it with MAIN_BRANCH
  # MAIN_BRANCH in lowercase, shortened to 63 bytes, and
  # with everything except 0-9 and a-z replaced with -.
  # for example 26.1 -> 26-1
  MAIN_BRANCH_SLUG: master

  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  KANIKO_REGISTRY_MIRROR: docker-proxy.binary.picodata.io
  FF_USE_FASTZIP: "true"
  FF_TIMESTAMPS: "true"
  CACHE_COMPRESSION_LEVEL: "fastest"
  CACHE_POLICY: pull-push
  GIT_STRATEGY: clone
  GIT_DEPTH: 1
  GET_SOURCES_ATTEMPTS: 3
  GIT_FETCH_TAGS_DIRS: ".,tarantool-sys,tarantool-sys/third_party/luajit"
  PARENT_BRANCH: $CI_COMMIT_REF_NAME
  PARENT_CI_COMMIT_SHA: $CI_COMMIT_SHA
  PARENT_PROJECT_PATH: ${CI_PROJECT_PATH}.git
  TARANTOOL_VERSION: 2.11.2.159
  RUST_VERSION: 1.97
  FF_NETWORK_PER_BUILD: 1
  RAW_REGISTRY: $RAW_PRIVATE_REGISTRY
  CI_DEBUG_SERVICES: "true"
  # k8s runner config
  KUBERNETES_CPU_REQUEST: 2
  KUBERNETES_MEMORY_REQUEST: "4Gi"
  SCCACHE_DIR: $CI_PROJECT_DIR/.sccache
  SCCACHE_CACHE_SIZE: "15G"
  COMPILER_LAUNCHER: "sccache"
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  ROLLING_BINARIES_DIR: $CI_PROJECT_DIR/.rolling_binaries

# job:rules explained:
#
# - if build-base changes on master branch (compared to HEAD~1)
#     * build-base-image (with tag latest) and push
#     * test (on base-image:latest)
# - if build-base changes on development branch (compared to master)
#     * build-base-image (with tag sha)
#     * test (on base-image:sha)
# - else (if build-base doesn't change)
#     * skip build-base-image
#     * just test (on base-image:latest)
#
# Anchor syntax explained here:
# https://docs.gitlab.com/ee/ci/yaml/yaml_optimization.html
#
.rules:
  - &if-build-base-changes-on-master-branch
    if: ($CI_COMMIT_BRANCH == $MAIN_BRANCH) && ($CI_PIPELINE_SOURCE != "schedule")
    changes:
      paths: &build-base-changes-paths
        - docker-build-base/**
        - tools/clone.sh
        - .gitlab-ci.yml
        - .pre-commit-config.yaml

  - &if-build-base-changes-on-dev-branch
    if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
      paths:
        - docker-build-base/**
        - tools/clone.sh
        - .gitlab-ci.yml
        - .pre-commit-config.yaml
      compare_to: *main-branch

  - &if-no-docs
    if: ($CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME !~ /^docs/) || $CI_COMMIT_TAG

.cache_git: &cache_git
  paths:
    - $CI_PROJECT_DIR
  key: cache_git-$CI_COMMIT_REF_SLUG
  fallback_keys:
    - cache_git-$MAIN_BRANCH_SLUG

.base_cache: &base_cache
  paths:
    - .cargo/
    - .sccache/
  key: "base_cache-${TARGET}-$CI_COMMIT_REF_SLUG"
  fallback_keys:
    - base_cache-${TARGET}-$MAIN_BRANCH_SLUG

.cmake_downloads_cache: &cmake_downloads_cache
  paths:
    - tarantool-sys/.cmake-downloads/
  key: cmake_downloads-${TARGET}-$CI_COMMIT_REF_SLUG
  fallback_keys:
    - cmake_downloads-${TARGET}-$MAIN_BRANCH_SLUG

.base_node: &base_node
  paths:
    - webui/node_modules/
  key: "base_node-$CI_COMMIT_REF_SLUG"
  fallback_keys:
    - base_node-$MAIN_BRANCH_SLUG

.py_cache: &py_cache
  paths:
    - .venv
  key: "py_cache-$CI_COMMIT_REF_SLUG"
  fallback_keys:
    - py_cache-$MAIN_BRANCH_SLUG

.rolling_binaries_cache: &rolling_binaries_cache
  paths:
    - .rolling_binaries/
  key: "rolling_binaries_cache-$CI_COMMIT_REF_SLUG"
  fallback_keys:
    - rolling_binaries_cache-$MAIN_BRANCH_SLUG

.kaniko_image: &kaniko_image
  image:
    name: docker-public.binary.picodata.io/kaniko-project/executor:v1.23.1-debug
    entrypoint: [""]
    pull_policy: [if-not-present]
  tags:
    - docker-k8s
  variables:
    GIT_USERNAME: $CI_REGISTRY_USER
    GIT_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    - >
      /kaniko/executor --context $CI_PROJECT_DIR --dockerfile ${DOCKERFILE}
      --build-arg TARANTOOL_VERSION=${TARANTOOL_VERSION}
      --build-arg RUST_VERSION=${RUST_VERSION}
      --build-arg BASE_IMAGE=${BASE_IMAGE}
      --build-arg BASE_IMAGE_TAG=${BASE_IMAGE_TAG}
      ${PUSH_DOCKER}
      --cache=false --cache-run-layers=true --single-snapshot --compressed-caching=false --use-new-run --snapshot-mode=redo --cleanup
      --destination ${DESTINATION}

tarantool-module-trigger:
  stage: test
  # Without this inherit there were strange bugs in child pipeline,
  # when jobs did not see job variables like $CARGO_HOME.
  # Anyway this child pipeline always was independent, it does not need variables from this file,
  # except MAIN_BRANCH which is used in rules. If global variable is used in rules - it should be
  # inherited.
  inherit:
    variables:
      - MAIN_BRANCH
  variables:
    PARENT_CI_PIPELINE_SOURCE: $CI_PIPELINE_SOURCE
  trigger:
    include: tarantool/.gitlab-ci.yml
    strategy: depend
  needs: []
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $MAIN_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: *main-branch
        paths:
          - tarantool/**/*
          - tarantool-sys
    - when: manual
      allow_failure: true

certlinters:
  stage: test
  needs: []
  rules:
    - when: manual
      allow_failure: true
  variables:
    PROJECT_TARGET: "picodata"
    BRANCH_TARGET: $CI_COMMIT_REF_NAME
    SVACE: "true"
    SONARQUBE: "true"
    BUILD: "false"
    DEPLOY: "false"
  inherit:
    variables:
      - MAIN_BRANCH
  trigger:
    project: "picodata/devops/builder"
    strategy: depend

docs:
  needs: []
  trigger:
    include: docs/.gitlab-ci.yml
    strategy: depend
  variables:
    PARENT_CI_PIPELINE_SOURCE: $CI_PIPELINE_SOURCE
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - changes:
        paths:
          - docker-build-base/docs.Dockerfile
          - docs/.gitlab-ci.yml
        compare_to: *main-branch
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
    - changes:
        paths:
          - docs/**/*
        compare_to: *main-branch
    - if: $CI_COMMIT_BRANCH == $MAIN_BRANCH
  inherit:
    variables:
      - MAIN_BRANCH
      - MAIN_BRANCH_SLUG
      - RUST_VERSION
      - TARANTOOL_VERSION
      - BASE_IMAGE_TAG
      - BASE_IMAGE_LATEST

build-base-image:
  stage: build-base-image
  <<: *kaniko_image
  rules:
    - <<: *if-build-base-changes-on-master-branch
    - <<: *if-build-base-changes-on-dev-branch
      variables:
        BASE_IMAGE_TAG: ${PARENT_CI_COMMIT_SHA}
    - when: manual
      allow_failure: true
      variables:
        BASE_IMAGE_TAG: ${BASE_IMAGE_LATEST}
  variables:
    DOCKERFILE: docker-build-base/Dockerfile
    DESTINATION: ${BASE_IMAGE}:${BASE_IMAGE_TAG}

# When on master, the job creates cache containing fully fetched repository in working directory.
# The cache includes submodules. This will happen once
# per day or more. In dev branches, the cache is taken from the master by
# fallback_keys and the current commit is fetched. In dev branches cloning via
# gitlab is disabled in tests and lint, and implemented via git clone/fetch.
clone:
  stage: clone
  cache:
    - <<: *cache_git
      policy: $CACHE_POLICY
  rules:
    - if: $CI_COMMIT_BRANCH == $MAIN_BRANCH
      variables:
        # $MAIN_BRANCH should use a push cache policy so that master doesn't pull
        # the previous master. This is important because there may be uncommitted
        # changes when using git fetch -uf
        CACHE_POLICY: push
      # dev branches should use a pull-push cache policy so that tests have the
      # corresponding dev branch that we fetched during the clone step. This is
      # important because tests should check the dev branch, not the master.
    - <<: *if-build-base-changes-on-dev-branch
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
    - <<: *if-no-docs
    - if: $CI_PIPELINE_SOURCE == "schedule"
  variables:
    GIT_STRATEGY: none
    # slow is as fast as the fastest level, but the cache takes up 40% less space
    CACHE_COMPRESSION_LEVEL: "slow"
  script:
    - clone.sh
    # Gitlab CI implicitly clones specific refs (e.g. `refs/pipelines/xxxxxxx`),
    # but it doesn't imply fetching tags. We clone them manually with the
    # `git fetch` command.
    #
    # Tags in `tarantool-sys` and `luajit` submodules are necessary for
    # the build scripts. Without them the job fails.
    - ./tools/get_tags.py

.poetry-install: &poetry-install |
  # Poetry install
  ci-log-section start "poetry-install" Installing python dependencies ...
  POETRY_VIRTUALENVS_IN_PROJECT=1 PIP_NO_CACHE_DIR=true poetry install --no-interaction --ansi
  ci-log-section end "poetry-install"

make-py-cache:
  stage: clone
  cache:
    - <<: *py_cache
      policy: $CACHE_POLICY
  rules:
    - if: $CI_COMMIT_BRANCH == $MAIN_BRANCH
      variables:
        # $MAIN_BRANCH should use a push cache policy so that master doesn't pull
        # the previous master. This is important because there may be uncommitted
        # changes when using git fetch -uf
        CACHE_POLICY: push
        # dev branches should use a pull-push cache policy so that tests have the
        # corresponding dev branch that we fetched during the clone step. This is
        # important because tests should check the dev branch, not the master.
    - <<: *if-build-base-changes-on-dev-branch
    - <<: *if-no-docs
  script:
    - *poetry-install

.test_rules:
  variables:
    RUST_BACKTRACE: full
    GIT_STRATEGY: none
    KUBERNETES_CPU_REQUEST: 6
    KUBERNETES_MEMORY_REQUEST: "6Gi"
    # By default "fast-release" profile is used, because of its faster
    # compilation time compared to the "release" profile, which includes
    # additional optimizations.
    # The actual "release" profile is only used when running on master branch.
  rules:
    - if: $CI_COMMIT_BRANCH == $MAIN_BRANCH
      variables:
        RELEASE_PROFILE: &release-profile "release"
        RELEASE_TARGET: &release-target "release"
        # if the cache policy is pull-push, then the cache is layered on the previous version of the cache, and it takes up more and more space
        CACHE_POLICY: push
    - <<: *if-build-base-changes-on-dev-branch
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
        RELEASE_PROFILE: &release-profile "fast-release"
        RELEASE_TARGET: &release-target "fast-release"
        CACHE_POLICY: pull
    - <<: *if-no-docs
      variables:
        RELEASE_PROFILE: &release-profile "fast-release"
        RELEASE_TARGET: &release-target "fast-release"
        CACHE_POLICY: pull

.parallel:
  parallel:
    matrix:
      - BUILD_PROFILE: *release-profile
        TARGET: *release-target
      - BUILD_PROFILE: dev
        TARGET: debug

build-linux:
  stage: test
  extends:
    - .test_rules
    - .parallel
  cache:
    - <<: *cache_git
      policy: pull
    - <<: *base_cache
      policy: $CACHE_POLICY
    - <<: *cmake_downloads_cache
      policy: pull-push
    - <<: *base_node
      policy: $CACHE_POLICY
  script:
    - tools/ensure_checkout.sh
    - git rev-parse HEAD
    - tools/check_rust.sh
    - cargo -V

    # Setup sccache
    - |
      ci-log-section start "sccache-setup" Setting up sccache ...
      sccache --show-stats
      ci-log-section end "sccache-setup"

    - |
      ci-log-section start "build" Build
      if [ "$BUILD_PROFILE" = "dev" ]; then
        make coverage-build-$BUILD_PROFILE CARGO_FLAGS_EXTRA="--timings"
      else
        make build-$BUILD_PROFILE CARGO_FLAGS_EXTRA="--timings"
      fi
      ci-log-section end "build"

    # Show sccache statistics
    - |
      ci-log-section start "sccache-stats" sccache statistics ...
      sccache --show-stats
      ci-log-section end "sccache-stats"

    - |
      if [ "$BUILD_PROFILE" = "dev" ]; then
        ci-log-section start "coverage-data" prepare coverage data ...
        du -hc --max-depth=1 target
        make coverage-data-merge
        make coverage-trim-target
        du -hc --max-depth=1 target
        ci-log-section end "coverage-data"
      else
        # we need only couple files from target directory for non coverage build
        tar cf bckp.tar target/$TARGET/picodata target/$TARGET/libtestplug.so
        rm -rf target/$TARGET
        tar xf bckp.tar
        rm bckp.tar
      fi

  artifacts:
    paths:
      - target
      - test/plugins/plug_*/target/debug/libplug_*.so
      - test/plugins/plug_*/target/cov/x86_64-unknown-linux-gnu/debug/libplug_*.so
    expire_in: 3 days

test-rs-linux:
  stage: test
  extends:
    - .test_rules
    - .parallel
  cache:
    - <<: *cache_git
      policy: pull
    - <<: *cmake_downloads_cache
      policy: pull-push
    - <<: *base_cache
      policy: pull
  script:
    - tools/ensure_checkout.sh

    # Setup sccache
    - |
      ci-log-section start "sccache-setup" Setting up sccache ...
      sccache --show-stats
      ci-log-section end "sccache-setup"

    - |
      ci-log-section start "test sql-planner" Test sql-planner
      pushd sql-planner
      make test
      make bench_check
      popd
      ci-log-section end "test sql-planner"

    - |
      ci-log-section start "test" Test
      if [ "$BUILD_PROFILE" = "dev" ]; then
        make coverage-test-rs \
          CARGO_FLAGS_EXTRA="--profile=$BUILD_PROFILE"
      else
        make test-rs \
          CARGO_FLAGS_EXTRA="--profile=$BUILD_PROFILE"
      fi
      ci-log-section end "test"

    # Show sccache statistics
    - |
      ci-log-section start "sccache-stats" sccache statistics ...
      sccache --show-stats
      ci-log-section end "sccache-stats"

    - |
      if [ "$BUILD_PROFILE" = "dev" ]; then
        ci-log-section start "coverage-data" prepare coverage data ...
        du -hc --max-depth=1 target
        make coverage-data-merge
        make coverage-trim-target
        du -hc --max-depth=1 target
        tar czf - target | curl --insecure --silent  --upload-file - --fail \
          --show-error --max-time 1200 --user "$GITCACHE_FS_CRED" \
          "https://picofs.picodata.int/gitlab_cache/target-testrs-${BUILD_PROFILE}-${CI_PIPELINE_ID}.tar.gz"
        echo "coverage data uploaded"
        ci-log-section end "coverage-data"
      fi

  artifacts:
    when: always
    paths:
      - junit_pytest.xml
      - core*
    reports:
      junit: junit_pytest.xml

.test-py-linux_base:
  extends:
    - .test_rules
    - .parallel
  needs:
    - job: build-linux
      artifacts: true
  artifacts:
    when: always
    paths:
      - junit_pytest.xml
      - core*
    reports:
      junit: junit_pytest.xml

test-py-sql-linux:
  stage: test
  extends:
    - .test-py-linux_base
  cache:
    - <<: *cache_git
      policy: pull
    - <<: *py_cache
      policy: pull
  script:
    - *poetry-install
    - |
      ci-log-section start "test" Test
      if [ "$BUILD_PROFILE" = "dev" ]; then
        make coverage-test-py \
          PYTEST_FLAGS="--junitxml=junit_pytest.xml --with-webui -n$KUBERNETES_CPU_REQUEST --durations=10 -k '(sql or pgproto)'"
      else
        make test-py \
          PYTEST_FLAGS="--junitxml=junit_pytest.xml --with-webui -n$KUBERNETES_CPU_REQUEST --durations=10 -k '(sql or pgproto)'"
      fi
      ci-log-section end "test"
    - |
      if [ "$BUILD_PROFILE" = "dev" ]; then
        ci-log-section start "coverage-data" prepare coverage data ...
        du -hc --max-depth=1 target
        make coverage-data-merge
        make coverage-trim-target
        du -hc --max-depth=1 target
        tar czf - target | curl --insecure --silent  --upload-file - --fail \
          --show-error --max-time 1200 --user "$GITCACHE_FS_CRED" \
          "https://picofs.picodata.int/gitlab_cache/target-testpysql-${BUILD_PROFILE}-${CI_PIPELINE_ID}.tar.gz"
        echo "coverage data uploaded"
        ci-log-section end "coverage-data"
      fi
  after_script:
    - ./tools/upload-flake-tracker-report.sh

install-rolling-binaries:
  stage: test
  variables:
    GIT_STRATEGY: none
  cache:
    - <<: *cache_git
      policy: pull
    - <<: *py_cache
      policy: pull
    - <<: *rolling_binaries_cache
      policy: $CACHE_POLICY
  rules:
    - if: $CI_COMMIT_BRANCH == $MAIN_BRANCH
      changes:
        paths:
          - test/int/test_rolling.py
      variables:
        CACHE_POLICY: push
    - if: $CI_COMMIT_BRANCH == $MAIN_BRANCH
      variables:
        CACHE_POLICY: pull
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: *main-branch
        paths:
          - test/int/test_rolling.py
      variables:
        CACHE_POLICY: push
    - <<: *if-build-base-changes-on-dev-branch
      variables:
        CACHE_POLICY: pull
    - <<: *if-no-docs
      variables:
        CACHE_POLICY: pull
  script:
    - tools/ensure_checkout.sh
    - *poetry-install
    - |
      ci-log-section start "install-rolling-binaries" Installing Picodata binaries needed for rolling upgrade tests ...
      make collect-required-rolling-versions
      poetry run tools/install_rolling_binaries.py
      ci-log-section end "install-rolling-binaries"
  artifacts:
    paths:
      - .rolling_binaries/

test-py-not-sql-linux:
  stage: test
  extends:
    - .test-py-linux_base
  needs:
    - job: build-linux
      artifacts: true
    - job: install-rolling-binaries
      artifacts: true
  before_script:
    - export PATH="${ROLLING_BINARIES_DIR}:$PATH"
  cache:
    - <<: *cache_git
      policy: pull
    - <<: *py_cache
      policy: pull
    - <<: *rolling_binaries_cache
      policy: pull
  script:
    - *poetry-install
    - |
      ci-log-section start "test" Test
      if [ "$BUILD_PROFILE" = "dev" ]; then
        make coverage-test-py \
          PYTEST_FLAGS="--junitxml=junit_pytest.xml --with-webui -n$KUBERNETES_CPU_REQUEST --durations=10 -k 'not (sql or pgproto)'"
      else
        make test-py \
          PYTEST_FLAGS="--junitxml=junit_pytest.xml --with-webui -n$KUBERNETES_CPU_REQUEST --durations=10 -k 'not (sql or pgproto)'"
      fi
      ci-log-section end "test"
    - |
      if [ "$BUILD_PROFILE" = "dev" ]; then
        ci-log-section start "coverage-data" prepare coverage data ...
        du -hc --max-depth=1 target
        make coverage-data-merge
        make coverage-trim-target
        du -hc --max-depth=1 target
        tar czf - target | curl --insecure --silent  --upload-file - --fail \
          --show-error --max-time 1200 --user "$GITCACHE_FS_CRED" \
          "https://picofs.picodata.int/gitlab_cache/target-testpynotsql-${BUILD_PROFILE}-${CI_PIPELINE_ID}.tar.gz"
        echo "coverage data uploaded"
        ci-log-section end "coverage-data"
      fi
  after_script:
    - ./tools/upload-flake-tracker-report.sh

lint:
  stage: test
  rules:
    - <<: *if-build-base-changes-on-dev-branch
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
        CACHE_POLICY: pull
    - <<: *if-no-docs
      variables:
        CACHE_POLICY: pull
    - if: $CI_COMMIT_BRANCH == $MAIN_BRANCH
  variables:
    GIT_STRATEGY: none
    TARGET: debug
  cache:
    - <<: *cache_git
      policy: pull
    - <<: *py_cache
      policy: pull
    - <<: *base_cache
      policy: pull
    - <<: *base_node
      policy: pull
  script:
    - tools/ensure_checkout.sh
    # Setup sccache
    - |
      ci-log-section start "sccache-setup" Setting up sccache ...
      sccache --show-stats
      ci-log-section end "sccache-setup"

    - *poetry-install
    - make lint
    - make -C webui lint

    # Show sccache statistics
    - |
      ci-log-section start "sccache-stats" sccache statistics ...
      sccache --show-stats
      ci-log-section end "sccache-stats"

.test-patch-rules: &test-patch-rules
  rules:
    - if: ($CI_COMMIT_BRANCH == $MAIN_BRANCH) && ($CI_PIPELINE_SOURCE == "schedule")
    - <<: *if-build-base-changes-on-dev-branch
      when: manual
      allow_failure: true
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
    - when: manual
      allow_failure: true

test-patch-picodata:
  stage: test
  extends: .test_rules
  <<: *test-patch-rules
  variables:
    BUILD_PROFILE: release
    KUBERNETES_CPU_REQUEST: 8
    KUBERNETES_MEMORY_REQUEST: "8Gi"
  cache:
    - <<: *cache_git
      policy: pull
    - <<: *py_cache
      policy: pull
    - <<: *base_cache
      policy: pull
    - <<: *base_node
      policy: pull
  script:
    - *poetry-install
    - ./tools/prepare_source_tree_for_stat_analysis.py apply
    - make build-$BUILD_PROFILE CARGO_FLAGS_EXTRA="--features webui,dynamic_build"
    - |
      make test \
        PYTEST_FLAGS="--junitxml=junit_pytest.xml --with-webui" \
        CARGO_FLAGS_EXTRA="--profile=$BUILD_PROFILE --features dynamic_build"
  after_script:
    - ./tools/upload-flake-tracker-report.sh

test-patch-tarantool:
  stage: test
  extends: .test_rules
  <<: *test-patch-rules
  cache:
    - <<: *cache_git
      policy: pull
    - <<: *py_cache
      policy: pull
    - <<: *base_cache
      policy: pull
    - <<: *cmake_downloads_cache
      policy: pull-push
  script:
    - ./tools/prepare_source_tree_for_stat_analysis.py apply
    - pushd tarantool-sys/ && make -f .test.mk test-release;
  after_script:
    - find /tmp/t/ -type s -delete
    - mv /tmp/t tarantool-sys/test/artifacts
  artifacts:
    when: always
    paths:
      - tarantool-sys/test/artifacts/

test-mac-m1:
  stage: test
  extends: .test_rules
  variables:
    GIT_STRATEGY: fetch
    GIT_SUBMODULE_STRATEGY: recursive
  rules:
    - if: $CI_COMMIT_BRANCH == $MAIN_BRANCH
    - when: manual
      allow_failure: true
  tags:
    - mac-dev-m1
  timeout: 60m
  script:
    - corepack enable

    # Gitlab doesnt know about $HOME. If specified in variables it becomes empty
    - export CARGO_HOME=$HOME/.cargo
    - ./tools/get_tags.py
    - cargo +$RUST_VERSION -V
    - cargo +$RUST_VERSION build --locked --timings
    - cp target/cargo-timings/cargo-timing.html cargo-timing-without-webui.html
    - cargo +$RUST_VERSION build --features webui --locked --timings
    - cp target/cargo-timings/cargo-timing.html cargo-timing-with-webui.html
    # There are no Rust tests for `webui` feature.
    # It will be checked during integration tests.
    - cargo +$RUST_VERSION test --locked

    - cargo +$RUST_VERSION fmt -- -v --check
    - cargo +$RUST_VERSION clippy --version
    - cargo +$RUST_VERSION clippy --features "load_test webui error_injection" -- --deny clippy::all --no-deps
    # - *poetry-install
    # - poetry run pytest --numprocesses auto -v
    # - make lint
    # - |
  artifacts:
    when: always
    paths:
      - cargo-timing-without-webui.html
      - cargo-timing-with-webui.html
      - target/debug/picodata

.helm:
  stage: test
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: *main-branch
        paths:
          - docker/picodata.Dockerfile
          - docker/picodata-distroless.Dockerfile
          - docker/docker-compose.yml
      variables:
        PUSH_DOCKER: "--no-push"
    - if: ($CI_COMMIT_BRANCH == $MAIN_BRANCH) && ($CI_PIPELINE_SOURCE == "schedule")
      when: on_success
      variables:
        PUSH_DOCKER: ""
    - when: manual
      allow_failure: true

helm-image:
  extends: .helm
  variables:
    GIT_STRATEGY: none
    KUBERNETES_CPU_REQUEST: 8
    KUBERNETES_MEMORY_REQUEST: "8Gi"
    MULTIARCH: "true"
  parallel:
    matrix:
      - DOCKERFILE: docker/picodata.Dockerfile
        DESTINATION: ${REGISTRY}/picodata:master
  trigger:
    project: picodata/devops/picodata-in-docker
    branch: main
    strategy: depend

asan:
  stage: test
  trigger:
    include: .gitlab-ci-asan.yml
    strategy: depend
  rules:
    - if: $CI_COMMIT_TAG
    - if: $WITH_ASAN == "1"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - docker-build-base/**
          - tools/clone.sh
          - .gitlab-ci.yml
        compare_to: *main-branch
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
      when: manual
      allow_failure: true
    - when: manual
      allow_failure: true
  inherit:
    variables:
      - MAIN_BRANCH
      - WITH_ASAN
      - MAIN_BRANCH_SLUG
      - RUST_VERSION
      - TARANTOOL_VERSION
      - BASE_IMAGE
      - BASE_IMAGE_TAG
      - BASE_IMAGE_LATEST

pack-on-tag:
  stage: pack
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_TAG
  variables:
    PROJECT_TARGET: "picodata"
    TYPE: "RELEASE"
    BRANCH_TARGET: $CI_COMMIT_TAG
  inherit:
    variables:
      - TYPE
      - PROJECT_TARGET
      - BRANCH_TARGET
  trigger:
    project: "picodata/devops/builder"
    strategy: depend

pack-on-tag-certified:
  stage: pack
  rules:
    - when: manual
      allow_failure: true
  variables:
    PROJECT_TARGET: "picodata"
    TYPE: "RELEASE"
    BRANCH_TARGET: $CI_COMMIT_REF_NAME
    CERTIFICATION_BUILD: "true"
  inherit:
    variables:
      - TYPE
      - PROJECT_TARGET
      - BRANCH_TARGET
      - CERTIFICATION_BUILD
  trigger:
    project: "picodata/devops/builder"

.deploy-docker-tmpl:
  stage: docker
  variables:
    GIT_STRATEGY: none
    PUSH_DOCKER: ""
    MULTIARCH: "true"
  rules:
    - if: $CI_COMMIT_TAG
      variables:
        PARENT_BRANCH: ${CI_COMMIT_TAG}

deploy-docker:
  extends: .deploy-docker-tmpl
  parallel:
    matrix:
      - DOCKERFILE: docker/picodata.Dockerfile
        DESTINATION: ${REGISTRY}/picodata:${CI_COMMIT_TAG}
      - DOCKERFILE: docker/picodata-distroless.Dockerfile
        DESTINATION: ${REGISTRY}/picodata-distroless:${CI_COMMIT_TAG}
        PICODATA_VERSION: ${CI_COMMIT_TAG}
        REPO_URL: https://download.picodata.io
  trigger:
    project: picodata/devops/picodata-in-docker
    branch: main
    strategy: depend

docker-compose:
  stage: docker
  needs:
    ["helm-image: [docker/picodata.Dockerfile, ${REGISTRY}/picodata:master]"]
  tags:
    - picodata-shell
  rules:
    - if: ($CI_COMMIT_BRANCH != $MAIN_BRANCH) && ($CI_PIPELINE_SOURCE == "schedule")
      changes:
        compare_to: *main-branch
        paths:
          - docker/docker-compose.yml
    - if: ($CI_COMMIT_BRANCH == $MAIN_BRANCH) && ($CI_PIPELINE_SOURCE == "schedule")
      when: on_success
    - when: manual
      allow_failure: true
  script:
    - cd docker
    - mkdir --mode=777 pico/
    - docker-compose up -d --wait
    - sleep 30 # the cluster does not manage to assemble quickly enough
    - count=$(psql "user=admin host=127.0.0.1 port=55432 password=T0psecret sslmode=disable" -t -A -c "select count(*) from \"_pico_instance\"") && if [[ $count -eq 4 ]] ; then echo "OK"; else echo count=$count; exit 2; fi
  after_script:
    - cd docker
    - docker-compose logs
    - docker-compose rm -fsv
    - sudo rm -rf pico/

check-pycopin:
  stage: postpack-test
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    PICODATA_IMAGE: ${REGISTRY}/picodata:${CI_COMMIT_TAG}
  inherit:
    variables: false
  trigger:
    project: "core/drivers/picopyn"

examples:
  stage: postpack-test
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    PICODATA_VERSION: $CI_COMMIT_TAG
  trigger:
    project: core/examples
    branch: master

publish-picodata-plugin:
  stage: pack
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  rules:
    - <<: *if-build-base-changes-on-dev-branch
      when: manual
      allow_failure: true
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
    - when: manual
      allow_failure: true
      variables:
        BASE_IMAGE_TAG: ${BASE_IMAGE_LATEST}

  script:
    - if [ -z "$CARGO_REGISTRY_TOKEN" ]; then echo "Variable CARGO_TOKEN must be available, check that branch is protected" 1>&2 && exit 1; fi
    - make publish-picodata-plugin

audit:
  stage: test
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    CACHE_POLICY: pull
  rules:
    - if: ($CI_COMMIT_BRANCH == $MAIN_BRANCH) && ($CI_PIPELINE_SOURCE != "schedule")
    - when: manual
      allow_failure: true
  script:
    - make audit

clear-sccache:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "clear_sccache"
    - when: manual
      allow_failure: true
  variables:
    GIT_STRATEGY: none
  script:
    - |
      ci-log-section start "sccache-clear" Clearing sccache ...
      rm -rf ${SCCACHE_DIR}/*
      echo "Sccache directory cleared successfully"
      ci-log-section end "sccache-clear"
  cache:
    - <<: *base_cache
      policy: push
      when: always

deploy-coverage:
  stage: deploy
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^docs/
      when: never
    - <<: *if-build-base-changes-on-dev-branch
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
    - if: $CI_PIPELINE_SOURCE != "schedule"
  variables:
    GIT_STRATEGY: none
    TARGET: debug
  cache:
    - <<: *cache_git
      policy: pull
    - <<: *base_cache
      policy: pull
  dependencies: []
  script:
    - "set -o pipefail"
    - |
      curl --insecure --silent --fail --show-error --max-time 1200 \
       --user "$GITCACHE_FS_CRED" "https://picofs.picodata.int/gitlab_cache/target-testpynotsql-dev-${CI_PIPELINE_ID}.tar.gz" | tar xzf -
    - |
      curl --insecure --silent --fail --show-error --max-time 1200 \
       --user "$GITCACHE_FS_CRED" "https://picofs.picodata.int/gitlab_cache/target-testpysql-dev-${CI_PIPELINE_ID}.tar.gz" | tar xzf -
    - |
      curl --insecure --silent --fail --show-error --max-time 1200 \
       --user "$GITCACHE_FS_CRED" "https://picofs.picodata.int/gitlab_cache/target-testrs-dev-${CI_PIPELINE_ID}.tar.gz" | tar xzf -
    - make coverage-report
    - ZIP_FILENAME=picodata_${CI_COMMIT_REF_SLUG}_${CI_COMMIT_SHORT_SHA}
    - cd target/cov/coverage/report
    - zip -r --quiet ../$ZIP_FILENAME .
    - |
      curl --fail --show-error --retry 3  --max-time 300 -s -H "Authorization: ApiKey ${REPORTFILER_UPLOAD_TOKEN}" \
        -F "zipfile=@../${ZIP_FILENAME}.zip" https://fs.picodata.io/reportfiler/reportupload
    - REPORT_URL=https://fs.picodata.io/reportfiler/$ZIP_FILENAME/
    - |
      curl --verbose --fail --show-error --retry 3 --max-time 60 \
        --request POST \
        --header "PRIVATE-TOKEN: $CODECOVERAGE_BOT_TOKEN" \
        --form "note=Code coverage report: <${REPORT_URL}>" \
        --url "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/commits/$CI_COMMIT_SHA/comments"

validate-commit-headers:
  stage: test
  rules:
    - <<: *if-build-base-changes-on-dev-branch
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    # Full clone: large MRs or branches rebased onto an older base can
    # have $CI_MERGE_REQUEST_DIFF_BASE_SHA outside a shallow window.
    GIT_DEPTH: 0
  script:
    - |
      ci-log-section start "validate-commit-headers" Validating commit subjects via prek ...
      set -u
      BASE="$CI_MERGE_REQUEST_DIFF_BASE_SHA"
      HEAD_SHA="$(git rev-parse HEAD)"
      echo "Range: ${BASE}..${HEAD_SHA}"

      tmp="$(mktemp -d)"
      trap 'rm -rf "$tmp"' EXIT

      rc=0
      for sha in $(git rev-list --no-merges --reverse "${BASE}..${HEAD_SHA}"); do
        msg_file="$tmp/$sha"
        git log -1 --format=%B "$sha" > "$msg_file"

        if ! prek run \
              --stage commit-msg \
              --commit-msg-filename "$msg_file" \
              conventional-pre-commit; then
          subject="$(git log -1 --format=%s "$sha")"
          echo "FAIL: $sha $subject" >&2
          rc=1
        fi
      done
      ci-log-section end "validate-commit-headers"
      exit "$rc"

validate-release-notes:
  stage: test
  rules:
    - <<: *if-build-base-changes-on-dev-branch
      variables:
        BASE_IMAGE_TAG: ${CI_COMMIT_SHA}
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - |
      ci-log-section start "validate-release-notes" Validating release-note fragments via prek ...
      prek run --all-files --hook-stage pre-commit validate-release-notes
      ci-log-section end "validate-release-notes"
