# Configuration for the `pre-commit` framework (https://pre-commit.com/).
# Single source of truth for two checks, each executed locally (via the git
# hook installed by `make setup-hooks`) and in CI:
#   * commit-subject validation: `commit-msg` hook / `validate-commit-headers`
#   * release-note fragments:     `pre-commit` hook / `validate-release-notes`
#
# Bypass for emergencies only (CI gate still enforces):
#   git commit --no-verify

default_install_hook_types: [commit-msg, pre-commit]
default_stages: [commit-msg]

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        # Picodata extends the upstream default type set with `adr`, `doc`,
        # `empty`, `git` (entrenched in tooling and history).
        # Keep `docs`/`doc` as one regex type because conventional-pre-commit
        # v4.4 sorts types lexically; separate `doc` and `docs` entries make
        # `docs:` parse as the shorter `doc` type first.
        args:
          - --strict
          - build
          - chore
          - ci
          - docs?
          - feat
          - fix
          - perf
          - refactor
          - revert
          - style
          - test
          - adr
          - git
          - empty

  - repo: local
    hooks:
      - id: validate-release-notes
        name: Validate release-note fragments
        entry: python3 tools/release_notes.py --check
        language: system
        files: ^release_notes/unreleased/.*\.md$
        pass_filenames: true
        stages: [pre-commit]
